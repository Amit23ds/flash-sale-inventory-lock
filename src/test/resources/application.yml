spring:
  datasource:
    url: jdbc:h2:mem:demo_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

app:
  redis:
    redisson:
      connection-pool-size: 16
      connection-minimum-idle-size: 4
      timeout: 2s